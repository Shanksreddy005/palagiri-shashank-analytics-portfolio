<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E5E7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0051A8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Card -->
  <rect width="400" height="400" rx="30" fill="url(#grad1)" />
  
  <!-- Silhouette Representation -->
  <circle cx="200" cy="160" r="60" fill="#1D1D1F" opacity="0.15" />
  <path d="M100,320 C100,240 140,240 200,240 C260,240 300,240 300,320 Z" fill="#1D1D1F" opacity="0.15" />
  
  <!-- Modern Geometric overlay lines representing charts -->
  <line x1="60" y1="330" x2="340" y2="330" stroke="#1D1D1F" stroke-width="2" opacity="0.2" />
  
  <!-- Emerald & Indigo Data Highlight lines -->
  <path d="M 60,330 L 140,250 L 220,290 L 340,180" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round" />
  <path d="M 60,280 L 140,220 L 220,180 L 340,110" fill="none" stroke="#4F46E5" stroke-width="4" stroke-linecap="round" />
  
  <!-- Muted Blue target nodes -->
  <circle cx="340" cy="180" r="6" fill="#0071E3" />
  <circle cx="340" cy="110" r="6" fill="#0071E3" />
</svg>
